<html lang="en">
<head>

  <link href="https://fonts.googleapis.com/css2?family=Rubik+Vinyl&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <script type="text/javascript" src="https://cdn.emailjs.com/dist/email.min.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav>
       <ul>
          <li><a href="index.html">Home</a></li> 
          <li><a href="Video.html">Video Editing</a></li>
          <li><a href="Art.html">Art Design</a></li>
          <li><a href="CostumeDesgine.html">Costume Design</a></li> 
          <li><a href="#" onclick="openModal()">Contact Us</a></li>
      </ul>
    </nav>
  </header>

  <section class="Naama">
    <h1>Naama Melzer</h1>
    <h2>Video Editor</h2>
    <h3>Art & Costume Design</h3>
  </section>

  <!-- Photo Gallery Section -->
  <section class="gallery-section">

    <!-- Gallery with Previous and Next Controls (Gallery Buttons) -->
    <div class="gallery-container">
      <div class="gallery-slide">
        <img src="images/photo1.jpg" alt="Gallery Image 1" id="gallery-image">
        <img src="images/photo2.jpg" alt="Gallery Image 2" id="gallery-image">
        <img src="images/photo3.jpg" alt="Gallery Image 3" id="gallery-image">
        <img src="images/photo4.jpg" alt="Gallery Image 4" id="gallery-image">
        <img src="images/photo5.jpg" alt="Gallery Image 5" id="gallery-image">
        <img src="images/photo6.jpg" alt="Gallery Image 6" id="gallery-image">

      </div>
      <!-- Navigation Buttons -->
      <button class="gallery-button prev" onclick="moveSlide(-1)"></button>
      <button class="gallery-button next" onclick="moveSlide(1)"></button> 
     </div>
  </section>

  <!-- HTML Contact Form Modal -->
  <div id="contactModal" style="display: none;">
    <div class="modal-content">
      <span onclick="closeModal()">&times;</span>
      <h2>Contact Us</h2>
      <form id="contact-form">
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br><br>

        <label for="phone">Phone:</label><br>
        <input type="text" id="phone" name="phone"><br><br>

        <label for="message">Message:</label><br>
        <textarea id="message" name="message" required></textarea><br><br>

        <button type="submit" id="submit-btn">Submit</button>
      </form>
    </div>
  </div>

  <footer>
    <p>&copy; Naama Melzer - All rights reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
